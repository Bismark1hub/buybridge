[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "frontend"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 3000
  framework = "#custom"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
